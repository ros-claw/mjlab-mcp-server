# Safety Policy for UR5e Robot
# This file defines safety constraints for the Universal Robots UR5e

# Joint names in order
joint_names:
  - shoulder_pan_joint
  - shoulder_lift_joint
  - elbow_joint
  - wrist_1_joint
  - wrist_2_joint
  - wrist_3_joint

# Joint limits (radians)
# Based on UR5e specifications: ±360° for all joints
joint_limits:
  shoulder_pan_joint: [-6.28319, 6.28319]  # ±360°
  shoulder_lift_joint: [-6.28319, 6.28319]  # ±360°
  elbow_joint: [-6.28319, 6.28319]  # ±360°
  wrist_1_joint: [-6.28319, 6.28319]  # ±360°
  wrist_2_joint: [-6.28319, 6.28319]  # ±360°
  wrist_3_joint: [-6.28319, 6.28319]  # ±360°

# Joint velocity limits (rad/s)
# UR5e: Base joints 3.15 rad/s, Wrist joints 6.28 rad/s
joint_velocity_limits:
  shoulder_pan_joint: 3.15
  shoulder_lift_joint: 3.15
  elbow_joint: 3.15
  wrist_1_joint: 6.28
  wrist_2_joint: 6.28
  wrist_3_joint: 6.28

# Torque limits (Nm)
# Based on UR5e actuator specifications
torque_limits:
  shoulder_pan_joint: 150.0
  shoulder_lift_joint: 150.0
  elbow_joint: 150.0
  wrist_1_joint: 28.0
  wrist_2_joint: 28.0
  wrist_3_joint: 28.0

# Collision pairs to exclude (e.g., adjacent links that normally touch)
collision_exclude_pairs:
  - [base_link, shoulder_link]
  - [shoulder_link, upper_arm_link]
  - [upper_arm_link, forearm_link]
  - [forearm_link, wrist_1_link]
  - [wrist_1_link, wrist_2_link]
  - [wrist_2_link, wrist_3_link]

# Safety settings
environment_collision_enabled: true
self_collision_enabled: true
safety_margin: 0.05  # 5% safety margin on all limits
